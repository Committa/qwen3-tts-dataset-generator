model_size: "0.6b"
model_type: "custom_voice"   # "custom_voice" (preset speakers) | "base" (voice clone)
dtype: "bfloat16"
device_map: "cuda:0"
attn_implementation: "sdpa"

# --- custom_voice mode (preset speakers) ---
speaker: "Vivian"
language: "Italian"
instruct: ""

# --- base mode (voice clone from a reference audio) ---
# Uncomment and set model_type: "base" above to clone a custom voice.
# Place the reference audio at inputs/voices/<name>.wav and, for ICL mode
# (recommended), the transcript at inputs/voices/<name>.txt.
voice:
  name: "my_voice"            # -> inputs/voices/my_voice.wav + my_voice.txt
  x_vector_only_mode: false   # false=ICL (best quality, needs my_voice.txt) | true=x-vector-only
  prompt_cache: "workspace/.voice_cache"

batch_size: 4
seed: 42
max_new_tokens: 2048

asr_model: "medium"
asr_device: "cuda"
asr_compute_type: "float16"
wer_threshold: 0.20

target_sample_rate: 22050
target_lufs: -23.0
trim_silence_db: 40

val_ratio: 0.1

paths:
  input_sentences: "italian_sentences.txt"
  test_sentences: "test_sentences.txt"
  raw_wav: "workspace/raw_wav"
  accepted_wav: "workspace/accepted_wav"
  rejected: "workspace/rejected"
  manifest_train: "workspace/.manifest_train.csv"
  manifest_val: "workspace/.manifest_val.csv"
  report: "workspace/.report.json"
  checkpoint: "workspace/.generate_checkpoint.json"
  log_file: "logs/pipeline.log"

clean_on_full_run: true