## Model ----------------------------------------------------------------------

model_size: "1.7b"
model_type: "base"   # "custom_voice" (Qwen preset speakers) | "base" (voice clone from inputs/voices/)
dtype: "bfloat16"
device_map: "cuda:0"
attn_implementation: "sdpa"

## Voice ----------------------------------------------------------------------
# Speaker is the voice identity for BOTH modes:
# - custom_voice: name of a built-in Qwen preset speaker (e.g. "Vivian").
# - base:         name of a custom voice under inputs/voices/<speaker>.wav
#                 (and <speaker>.txt for ICL mode, see x_vector_only_mode below).

speaker: "Serena"
language: "Italian"    # explicit language required ("Auto" disables WER normalisation)

# custom_voice 1.7B only: style instruction in natural language (ignored by 0.6B model).
# Keep it SHORT and SINGLE-style (one emotion/tone cue): the model is trained on
# brief directives like "Very happy." or "calm, neutral tone", not on stacked
# prosodic rules. Cross-clip consistency comes from `temperature`, not the instruct.
instruct: "Read in a calm, neutral tone."

# Base mode only (ignored in custom_voice):
x_vector_only_mode: false    # false=ICL (best quality, needs inputs/voices/<speaker>.txt)
                             # true = x-vector-only (no transcript needed, lower quality)

## Generation ----------------------------------------------------------------

batch_size: 2
seed: 42
max_new_tokens: 512
mem_cleanup_every_n_batches: 100   # free GPU allocator pool every N batches to prevent VRAM fragmentation

# Sampling parameters forwarded to the Qwen3-TTS model.
#
# temperature is the main lever for cross-clip consistency: lower => the
# distribution is more peaked => less variance in tone/pauses/intonation
# across clips. The model is tuned at 0.9 (see the checkpoint's
# generation_config.json); going too low takes it out of distribution and
# can trigger EOS-collapse (the model emits the end-of-speech token
# prematurely, truncating the clip to a few words + silence).
# Truncated clips have high WER and are rejected by the `validate` step;
# regenerate them with: poetry run gen-dataset --step generate --only-rejected
#
# top_p: kept at 1.0 (author default). At low temperature, top_p < 1.0 cuts
# the tail of continuation tokens and can INCREASE EOS-collapse truncation
# (the nucleus collapses on the EOS token alone). 1.0 keeps the escape hatch
# open with negligible variance impact at temp=0.3.
#
# do_sample: false switches to greedy decoding (fully deterministic, but may
# produce artifacts/loops on codec TTS models — prefer low temperature with
# do_sample: true).
#
# Values below prioritize maximum homogeneity (consistency) over avoiding
# truncation; failed clips are recovered via validate -> --only-rejected.
do_sample: true
temperature: 0.4              # main consistency lever; 0.9 = author default (varied)
top_k: 50                     # candidate-token truncation; 50 = author default
top_p: 1.0                    # keep 1.0 at low temp (see comment above)
repetition_penalty: 1.05      # >1 discourages token loops; 1.05 = author default

## Validation ----------------------------------------------------------------

asr_model: "large-v3"
asr_device: "cuda"
asr_compute_type: "float16"
asr_workers: 2                # concurrent transcribe() calls (CTranslate2 inter_threads). On GPU the gain is marginal: throughput is CPU/GIL-bound, not GPU-bound. Set 1 if unsure.
asr_beam_size: 5              # beam size for ASR decoder (5=author default, 1=greedy). Speeds up the GPU decoder step, but has little effect on overall wav/s when throughput is CPU-bound.
wer_threshold: 0.25

## Pronunciation -------------------------------------------------------------
# Phoneme-level verification: catches clips that pass WER but whose actual
# pronunciation is wrong. The audio is recognised to espeak phonemes by a
# wav2vec2 CTC model and compared (PER = Phoneme Error Rate) against the
# espeak-ng text->phoneme rendering of the reference sentence.
#
# Requires the espeak-ng binary on PATH (the `phonemizer` library wraps it).
#   Windows : install the MSI from https://github.com/espeak-ng/espeak-ng/releases
#             and, if needed, set PHONEMIZER_ESPEAK_LIBRARY to espeak-ng.dll.
#   Linux   : sudo apt-get install espeak-ng
#
# `phoneme_check` gates the step in a full `gen-dataset` run; an explicit
# `--step pronunciation` always runs it (also with `--calibrate` to measure
# the PER distribution without rejecting anything, useful to tune the
# threshold). Run between `validate` and `normalize` so normalize only
# processes pronunciation survivors.
phoneme_check: true
phoneme_model: "facebook/wav2vec2-xlsr-53-espeak-cv-ft"
phoneme_device: "cuda"
phoneme_batch_size: 8         # wav2vec2 CTC batched inference (not thread-safe; uses batching, not workers)
phoneme_cleanup_every_n_batches: 10   # free CUDA allocator pool every N batches (wav2vec2 forward is short; pool grows monotonically without this)
phoneme_threshold: 0.28       # PER reject cutoff; phoneme recognition is noisier than word ASR
phoneme_word_report: true     # write workspace/.pronunciation_words.csv with per-word PER (diagnostic, both modes)
phoneme_word_top_n: 20        # number of worst-pronounced words to log and include in report.json
phoneme_report_min_occurrences: 3    # words must appear at least this many times in the corpus to be listed in the "worst words" report (prevents one-off artefacts from dominating)

## Normalization ------------------------------------------------------------

target_sample_rate: 22050
target_lufs: -23.0
trim_silence_db: 60
tail_margin_ms: 120    # ms of original signal kept past the trim end (protects final consonants)
tail_pad_ms: 80        # ms of silence appended at the end after trimming

## Dataset -------------------------------------------------------------------

input_sentences: "italian_piper_corpus.txt"        # TTS corpus, one sentence per line
test_sentences: "test_sentences.txt"    # phrases for `test-gen-dataset`
val_ratio: 0.1
clean_on_full_run: true